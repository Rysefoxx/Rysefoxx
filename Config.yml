#%Spieler% ist die Person, die gebannt wird. %GebanntVon% ist der Spieler der den Command ausführt.
#%Reason% ist die angegebene Reason von dem Spieler.

#Broadcastmessage wenn der Spieler gebannt wird.
StealthBroadcastMessage: false
Ban Message:
- "&4&lBAN &8- &cDer Spieler &4%Spieler% &cwurde von &4%GebanntVon% &cgebannt!"
- "&4&lBAN &8- &cGrund &8| &4%Reason%"


#Bei true wird die Unban Broadcastmessage nicht angezeigt.
StealthUnbanBroadcastMessage: false
Unban Message: "&4&lBAN &8- &cDer Spieler &4%Spieler% &cwurde von &4%UnbannedBy% &centbannt!"


#Dies erhält der Spieler, wenn er einen Spieler bannt / unbannt.
Player Ban Message: "&4&lBAN &8- &cDu hast erfolgreich &4%Spieler% &cgebannt."
Player Unban Message: "&4&lBAN &8- &cDu hast erfolgreich &4%Spieler% &centbannt."


CustomReasonInv:
